<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Loterias IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .admin-container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .login-box { max-width: 400px; margin: 100px auto; background: var(--bg-card); padding: 30px; border-radius: 20px; border: 2px solid var(--border); text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 2px solid var(--border); background: var(--bg-primary); color: var(--text-primary); }
        .login-box button { width: 100%; padding: 12px; margin-top: 15px; background: linear-gradient(135deg, #8b5cf6, #06b6d4); border: none; border-radius: 30px; color: white; font-weight: 600; cursor: pointer; }
        .data-section { margin-top: 30px; background: var(--bg-card); border-radius: 12px; padding: 20px; border: 2px solid var(--border); overflow-x: auto; }
        .data-section h3 { color: #f59e0b; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: rgba(56, 189, 248, 0.2); color: #38bdf8; }
        .btn-copiar { background: #22c55e; border: none; padding: 6px 12px; border-radius: 20px; color: white; cursor: pointer; font-size: 11px; }
        .btn-exportar { background: #8b5cf6; border: none; padding: 8px 16px; border-radius: 20px; color: white; cursor: pointer; font-size: 12px; }
        .logout-btn { background: #ef4444; border: none; padding: 6px 12px; border-radius: 20px; color: white; cursor: pointer; font-size: 12px; }
        .header-admin { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; }
        .error-msg { color: #ef4444; font-size: 12px; margin-top: 10px; }
        .status-login { text-align: center; padding: 20px; color: #22c55e; }
        .loading { text-align: center; padding: 40px; }
        .data-section table {
            font-size: 11px;
        }
        .data-section td {
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .data-section td:hover {
            white-space: normal;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="header-logo">
                <img src="/img/BrasãoRoa Imagem.png" onerror="this.style.display='none'" alt="Logo" style="width: 200px; height: auto;">
            </div>
            <div class="header-text">
                <div style="display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap;">
                    <h1 style="margin: 0; background: linear-gradient(135deg, #8b5cf6, #06b6d4, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 22px;">
                        🧠 Sistema Profissional de Loterias com IA Real
                    </h1>
                    <span class="version-badge">V.7.0 PRO</span>
                </div>
                <p class="header-subtitle">10 loterias • IA que Aprende Padrões • Login Social • Sistema de Créditos • PIX</p>
            </div>
            <div class="header-logo">
                <img src="/img/BrasãoRoa Imagem.png" onerror="this.style.display='none'" alt="Logo" style="width: 200px; height: auto;">
            </div>
        </div>
    </div>
    
    <div class="admin-container" id="adminContainer">
        <div id="loginArea">
            <div class="login-box">
                <h2>🔐 Acesso Administrativo</h2>
                <input type="email" id="adminEmail" placeholder="E-mail" value="">
                <input type="password" id="adminSenha" placeholder="Senha" value="">
                <button onclick="fazerLoginAdmin()">ENTRAR</button>
                <div id="loginError" class="error-msg"></div>
            </div>
         </div>
        
        <div id="dataArea" style="display: none;">
            <div class="header-admin">
                <h2>📊 Dados do Sistema</h2>
                <button class="logout-btn" onclick="fazerLogoutAdmin()">🚪 Sair</button>
            </div>
            <div id="dadosContainer"></div>
        </div>
    </div>

    <script>
        // Limpar campos ao carregar a página
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('adminEmail').value = '';
            document.getElementById('adminSenha').value = '';
            document.getElementById('loginError').innerHTML = '';
        });
        let adminToken = null;
        
        async function fazerLoginAdmin() {
            const email = document.getElementById('adminEmail').value;
            const senha = document.getElementById('adminSenha').value;
            const errorDiv = document.getElementById('loginError');
            
            errorDiv.innerHTML = '';
            
            if (!email || !senha) {
                errorDiv.innerHTML = '❌ Preencha e-mail e senha!';
                return;
            }
            
            console.log('Tentando login com:', email);
            
            try {
                const response = await fetch('/api/admin/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password: senha })
                });
                
                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Response data:', data);
                
                if (response.ok && data.success) {
                    adminToken = data.token;
                    document.getElementById('loginArea').style.display = 'none';
                    document.getElementById('dataArea').style.display = 'block';
                    carregarDadosAdmin();
                } else {
                    errorDiv.innerHTML = `❌ ${data.error || 'Credenciais inválidas'}`;
                }
                
            } catch (error) {
                console.error('Erro:', error);
                errorDiv.innerHTML = '❌ Erro ao conectar com o servidor';
            }
        }
        
        function fazerLogoutAdmin() {
            adminToken = null;
            document.getElementById('loginArea').style.display = 'block';
            document.getElementById('dataArea').style.display = 'none';
            document.getElementById('dadosContainer').innerHTML = '';
        }
        
        async function carregarDadosAdmin() {
            const container = document.getElementById('dadosContainer');
            container.innerHTML = '<div class="loading">📊 Carregando dados...</div>';
            
            try {
                const response = await fetch('/api/admin/data', {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Erro ao carregar');
                }
                
                renderizarDadosAdmin(data.usuarios || [], data.historico || [], data.transacoes || []);
                
            } catch (error) {
                console.error('Erro:', error);
                container.innerHTML = `<div class="status-login" style="color: #ef4444;">❌ Erro: ${error.message}</div>`;
            }
        }
        function renderizarDadosAdmin(usuarios, historico, transacoes) {
    const container = document.getElementById('dadosContainer');
    
    const copyTable = (tableId) => {
        const table = document.getElementById(tableId);
        if (!table) return;
        const range = document.createRange();
        range.selectNode(table);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
        window.getSelection().removeAllRanges();
        alert('✅ Tabela copiada!');
    };
    
    const exportCSV = (data, filename) => {
        if (!data || data.length === 0) {
            alert('Nenhum dado para exportar');
            return;
        }
        const headers = Object.keys(data[0]);
        const csvRows = [headers.join(',')];
        for (const row of data) {
            const values = headers.map(header => {
                let val = row[header];
                if (val === null) val = '';
                if (typeof val === 'object') val = JSON.stringify(val);
                return `"${String(val).replace(/"/g, '""')}"`;
            });
            csvRows.push(values.join(','));
        }
        const blob = new Blob([csvRows.join('\n')], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${filename}.csv`;
        a.click();
        URL.revokeObjectURL(url);
    };
    
    // TABELA USUÁRIOS - COMPLETA
    const usuariosHtml = `
        <div class="data-section">
            <h3>👥 USUÁRIOS (${usuarios.length} registros)
                <div>
                    <button class="btn-copiar" onclick="window.copyTableAdmin('tabelaUsuarios')">📋 Copiar</button>
                    <button class="btn-exportar" onclick="window.exportCSVAdmin(${JSON.stringify(usuarios).replace(/"/g, '&quot;')}, 'usuarios')">📎 Exportar CSV</button>
                </div>
            </h3>
            <div style="overflow-x: auto; max-height: 500px; overflow-y: auto;">
                <table id="tabelaUsuarios" style="min-width: 800px;">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>UID</th>
                            <th>NOME</th>
                            <th>EMAIL</th>
                            <th>FOTO</th>
                            <th>CRÉDITOS</th>
                            <th>PRO</th>
                            <th>EXPIRA PRO</th>
                            <th>CRIADO EM</th>
                            <th>ATUALIZADO EM</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${usuarios.map(u => `
                            <tr>
                                <td>${u.id?.substring(0,8)||'-'}...</td>
                                <td>${u.uid||'-'}</td>
                                <td><strong>${u.nome||'-'}</strong></td>
                                <td>${u.email||'-'}</td>
                                <td>${u.foto_url ? '✅' : '❌'}</td>
                                <td style="color:#f59e0b;font-weight:bold;">R$ ${u.creditos||0}</td>
                                <td style="color:${u.is_pro?'#22c55e':'#ef4444'};font-weight:bold;">${u.is_pro?'✅ SIM':'❌ NÃO'}</td>
                                <td>${u.pro_expires_at ? new Date(u.pro_expires_at).toLocaleDateString() : '-'}</td>
                                <td>${u.created_at ? new Date(u.created_at).toLocaleString() : '-'}</td>
                                <td>${u.updated_at ? new Date(u.updated_at).toLocaleString() : '-'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        </div>
    `;
    
    // TABELA HISTÓRICO - COMPLETA
    const historicoHtml = `
        <div class="data-section">
            <h3>📜 HISTÓRICO DE PALPITES (${historico.length} registros)
                <div>
                    <button class="btn-copiar" onclick="window.copyTableAdmin('tabelaHistorico')">📋 Copiar</button>
                    <button class="btn-exportar" onclick="window.exportCSVAdmin(${JSON.stringify(historico).replace(/"/g, '&quot;')}, 'historico')">📎 Exportar CSV</button>
                </div>
            </h3>
            <div style="overflow-x: auto; max-height: 500px; overflow-y: auto;">
                <table id="tabelaHistorico" style="min-width: 800px;">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>USUÁRIO (UID)</th>
                            <th>LOTERIA</th>
                            <th>JOGOS (NÚMEROS)</th>
                            <th>FILTROS</th>
                            <th>EXTRAS</th>
                            <th>MESES</th>
                            <th>QTD NÚMEROS</th>
                            <th>TIMES</th>
                            <th>DATA</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${historico.map(h => `
                            <tr>
                                <td>${h.id?.substring(0,8)||'-'}...</td>
                                <td>${h.usuario_uid?.substring(0,20)||'-'}...</td>
                                <td>${h.loteria||'-'}</td>
                                <td style="font-size: 10px;">${JSON.stringify(h.jogos)?.substring(0,100)||'-'}${JSON.stringify(h.jogos)?.length > 100 ? '...' : ''}</td>
                                <td>${h.filtros?.substring(0,50)||'-'}${h.filtros?.length > 50 ? '...' : ''}</td>
                                <td>${h.extras||'-'}</td>
                                <td>${h.meses ? JSON.stringify(h.meses) : '-'}</td>
                                <td>${h.quantidade_numeros||'-'}</td>
                                <td>${h.times ? JSON.stringify(h.times) : '-'}</td>
                                <td>${h.data ? new Date(h.data).toLocaleString() : '-'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        </div>
    `;
    
    // TABELA TRANSAÇÕES - COMPLETA
    const transacoesHtml = `
        <div class="data-section">
            <h3>💰 TRANSAÇÕES (${transacoes.length} registros)
                <div>
                    <button class="btn-copiar" onclick="window.copyTableAdmin('tabelaTransacoes')">📋 Copiar</button>
                    <button class="btn-exportar" onclick="window.exportCSVAdmin(${JSON.stringify(transacoes).replace(/"/g, '&quot;')}, 'transacoes')">📎 Exportar CSV</button>
                </div>
            </h3>
            <div style="overflow-x: auto; max-height: 500px; overflow-y: auto;">
                <table id="tabelaTransacoes" style="min-width: 800px;">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>USUÁRIO (UID)</th>
                            <th>TIPO</th>
                            <th>QUANTIDADE (R$)</th>
                            <th>SALDO APÓS (R$)</th>
                            <th>REFERENCE_ID</th>
                            <th>IDEMPOTENCY_KEY</th>
                            <th>METADATA</th>
                            <th>DATA</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${transacoes.map(t => `
                            <tr>
                                <td>${t.id?.substring(0,8)||'-'}...</td>
                                <td>${t.usuario_uid?.substring(0,20)||'-'}...</td>
                                <td style="color:${t.tipo==='compra'?'#22c55e':t.tipo==='uso'?'#ef4444':'#f59e0b'};font-weight:bold;">${t.tipo||'-'}</td>
                                <td style="color:#f59e0b;">R$ ${t.quantidade||0}</td>
                                <td>R$ ${t.saldo_apos||0}</td>
                                <td>${t.reference_id?.substring(0,20)||'-'}...</td>
                                <td>${t.idempotency_key?.substring(0,20)||'-'}...</td>
                                <td>${t.metadata ? JSON.stringify(t.metadata) : '-'}</td>
                                <td>${t.data ? new Date(t.data).toLocaleString() : '-'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        </div>
    `;
    
    container.innerHTML = usuariosHtml + historicoHtml + transacoesHtml;
    
    window.copyTableAdmin = copyTable;
    window.exportCSVAdmin = exportCSV;
}
        
    </script>
</body>
</html>
