<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estatísticas - Loterias IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Firebase SDK (CDN) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    
    <!-- Ponto de entrada da aplicação - TUDO no index.js -->
    <script src="js/estatisticas/index.js" type="module"></script>
    
    <style>
        /* ============================================
           ESTILOS GERAIS
        ============================================ */
        .stats-container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .lottery-grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .lottery-card-stats { background: var(--bg-secondary); padding: 15px; border-radius: var(--radius); border: 2px solid var(--border); cursor: pointer; transition: all 0.3s; text-align: center; }
        .lottery-card-stats:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .lottery-card-stats.active { border-color: #38bdf8; background: var(--bg-card); }
        .stats-cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .stats-card { background: var(--bg-card); border-radius: var(--radius); padding: 15px; border: 2px solid var(--border); }
        .stats-card h4 { font-size: 14px; color: var(--text-secondary); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid var(--border); display: flex; align-items: center; gap: 8px; }
        .stats-list { max-height: 300px; overflow-y: auto; }
        .stats-item { display: flex; justify-content: space-between; padding: 6px 8px; border-bottom: 1px solid var(--border); font-size: 13px; }
        .stats-item .numero { font-weight: 600; color: #38bdf8; }
        .stats-item .numero-pro { font-weight: 600; color: #f59e0b; cursor: pointer; }
        .stats-item .numero-pro:hover { filter: blur(2px); }
        .stats-item .quantidade { color: #f59e0b; }
        .stats-item:hover { background: rgba(56, 189, 248, 0.1); }
        .pro-badge-stats { display: inline-block; background: linear-gradient(135deg, #f59e0b, #eab308); color: #1e293b; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-left: 8px; }
        .pro-overlay { background: rgba(0,0,0,0.7); border-radius: 8px; padding: 20px; text-align: center; margin: 20px 0; }
        .periodo-filtros { display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0; }
        .periodo-btn { padding: 8px 16px; border: 2px solid var(--border); border-radius: 30px; background: var(--bg-card); cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .periodo-btn.ativo { background: #f59e0b; color: #1e293b; border-color: #f59e0b; font-weight: 600; }
        .info-periodo-stats { display: flex; gap: 15px; margin-top: 15px; padding: 10px; background: rgba(56, 189, 248, 0.1); border-radius: 12px; flex-wrap: wrap; }
        .loading-stats { text-align: center; padding: 40px; color: var(--text-secondary); }
        .error-stats { background: rgba(239, 68, 68, 0.1); border: 2px solid #ef4444; padding: 15px; border-radius: var(--radius); text-align: center; color: #fca5a5; }
        .footer-stats { margin-top: 40px; margin-bottom: 20px; text-align: center; }
        .btn-footer { background: #64748b; border: none; padding: 10px 25px; border-radius: 30px; color: white; font-weight: 600; cursor: pointer; margin: 5px; }
        .header-logo { font-size: 32px; min-width: 50px; text-align: center; }
        .user-info-bar {
            display: flex;
            align-items: center;
            gap: 20px;
            background: var(--bg-card);
            padding: 12px 20px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            flex-wrap: wrap;
            border: 1px solid var(--border);
        }
        .user-info-bar .info-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); }
        .user-info-bar .info-item .label { font-weight: 300; }
        .user-info-bar .info-item .value { font-weight: 600; color: var(--text-primary); }
        .user-info-bar .info-item .badge-pro { background: linear-gradient(135deg, #f59e0b, #eab308); color: #1e293b; padding: 2px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        .user-info-bar .info-item .badge-free { background: #334155; color: #94a3b8; padding: 2px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        .user-info-bar .info-item .user-name { font-weight: 600; color: #38bdf8; }
        
        /* ============================================
           ESTILOS ESPECIAIS
        ============================================ */
        .milionaria-trevos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .milionaria-trevos-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 15px;
            border: 2px solid var(--border);
        }
        .milionaria-trevos-card h4 {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .trevo-heatmap-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 4px 0;
        }
        .trevo-heatmap-item .label { width: 70px; font-size: 13px; color: var(--text-secondary); font-weight: 500; }
        .trevo-heatmap-item .bar { flex: 1; height: 20px; background: #0f172a; border-radius: 4px; overflow: hidden; }
        .trevo-heatmap-item .bar .fill { height: 100%; border-radius: 4px; transition: width 0.3s; min-width: 2px; }
        .trevo-heatmap-item .qtd { width: 50px; text-align: right; font-size: 13px; color: #f59e0b; font-weight: 600; }
        .trevo-ranking-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px;
        }
        .trevo-ranking-item {
            background: #0f172a;
            border-radius: 6px;
            padding: 8px 12px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .trevo-ranking-item .medalha { font-size: 20px; }
        .trevo-ranking-item .trevo-num { font-size: 16px; font-weight: bold; color: #38bdf8; }
        .trevo-ranking-item .trevo-qtd { font-size: 11px; color: #94a3b8; }
        .trevo-pares-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 8px;
        }
        .trevo-par-item {
            background: #0f172a;
            border-radius: 6px;
            padding: 6px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
        }
        .trevo-par-item .par { font-weight: 600; color: #f59e0b; }
        .trevo-par-item .qtd { font-size: 12px; color: #94a3b8; }
        .trevo-matriz {
            display: grid;
            grid-template-columns: 30px repeat(6, 1fr);
            gap: 4px;
            max-width: 400px;
            margin: 0 auto;
        }
        .trevo-matriz .header { color: #94a3b8; font-size: 11px; text-align: center; font-weight: 600; padding: 4px; }
        .trevo-matriz .cell {
            background: #0f172a;
            border-radius: 4px;
            padding: 6px 4px;
            text-align: center;
            font-size: 12px;
            color: #e2e8f0;
            border: 1px solid #1e293b;
        }
        .trevo-matriz .cell.diagonal { background: transparent; border: none; color: #64748b; }
        .trevo-matriz .cell.destaque { background: rgba(56, 189, 248, 0.2); border-color: #38bdf8; }
        .trevo-matriz .cell.destaque-alta { background: rgba(34, 197, 94, 0.3); border-color: #22c55e; }
        .trevo-atraso-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 8px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        .trevo-atraso-item .status { font-size: 16px; }
        .trevo-atraso-item .trevo { font-weight: 600; color: #38bdf8; }
        .trevo-atraso-item .atraso { color: #f59e0b; }
        
        /* Loteca */
        .loteca-stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .loteca-jogo-card { background: var(--bg-card); border-radius: var(--radius); padding: 12px; border: 2px solid var(--border); }
        .loteca-jogo-card h5 { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
        .loteca-bar { display: flex; gap: 4px; height: 20px; margin: 4px 0; }
        .loteca-bar .casa { background: #38bdf8; height: 100%; border-radius: 3px; }
        .loteca-bar .empate { background: #f59e0b; height: 100%; border-radius: 3px; }
        .loteca-bar .fora { background: #ef4444; height: 100%; border-radius: 3px; }
        .loteca-legend { display: flex; gap: 15px; font-size: 11px; color: var(--text-secondary); margin-top: 6px; flex-wrap: wrap; }
        
        @media (max-width: 768px) { 
            .stats-cards-grid { grid-template-columns: 1fr; } 
            .lottery-grid-stats { grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); }
            .user-info-bar { flex-direction: column; align-items: stretch; gap: 10px; }
            .milionaria-trevos-grid { grid-template-columns: 1fr; }
            .trevo-matriz { max-width: 100%; }
            .trevo-ranking-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="header-logo">🎰</div>
            <div class="header-text">
                <h1>🧠 Loterias V.6.1 <span class="version-badge">ESTATÍSTICAS</span></h1>
                <p class="header-subtitle">Análise completa de números, duplas, tríades, times e meses</p>
            </div>
            <div class="header-logo">🎯</div>
        </div>
    </div>

    <div class="stats-container">
        <!-- User Info -->
        <div class="user-info-bar" id="userInfoBar">
            <div class="info-item">
                <span>👤</span>
                <span class="label">Usuário:</span>
                <span class="user-name" id="userNameDisplay">Carregando...</span>
            </div>
            <div class="info-item">
                <span>⭐</span>
                <span class="label">Plano:</span>
                <span id="userPlanBadge" class="badge-free">FREE</span>
            </div>
            <div class="info-item">
                <span>💳</span>
                <span class="label">Créditos:</span>
                <span class="value" id="userCredits">0</span>
            </div>
            <div class="info-item" id="proExpiresContainer" style="display:none;">
                <span>📅</span>
                <span class="label">Expira em:</span>
                <span class="value" id="userProExpires">-</span>
            </div>
            <div class="info-item" style="margin-left: auto;">
                <button onclick="window.location.href='index.html'" style="background: #8b5cf6; border: none; padding: 6px 16px; border-radius: 20px; color: white; font-weight: 600; cursor: pointer; font-size: 12px;">
                    🔑 Sistema
                </button>
            </div>
        </div>

        <!-- Grid de Loterias -->
        <div class="lottery-grid-stats" id="lotteryGridStats"></div>
        
        <!-- Período -->
        <div class="card">
            <h4>📅 Período (Baseado em data real)</h4>
            <div class="periodo-filtros" id="periodoFiltros">
                <button class="periodo-btn ativo" data-periodo="all">Todos</button>
                <button class="periodo-btn" data-periodo="1">1 Ano</button>
                <button class="periodo-btn" data-periodo="3">3 Anos</button>
                <button class="periodo-btn" data-periodo="5">5 Anos</button>
                <button class="periodo-btn" data-periodo="7">7 Anos</button>
                <button class="periodo-btn" data-periodo="9">9 Anos</button>
            </div>
            <div id="periodoInfo"></div>
        </div>
        
        <!-- Conteúdo das Estatísticas -->
        <div id="estatisticasContent"><div class="loading-stats">📊 Carregando estatísticas...</div></div>
        
        <!-- Footer -->
        <div class="footer-stats">
            <button class="btn-footer" onclick="window.location.href='index.html'">← Voltar ao Sistema</button>
            <div style="margin-top: 15px; font-size: 11px; color: var(--text-secondary);">© 2025 Loterias IA</div>
        </div>
    </div>
</body>
</html>
